<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unit echo</title>
  <link rel="stylesheet" href="../hermes-tokens.css">
  <script defer src="../render/hermes-shell.js" data-root="../" data-app="/" data-active="unit-echo"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink, #17140f);
      background: var(--paper-bg, #f4ead6);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { min-height: 100vh; }
    header, .controls, .equations, .visuals, .trace {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--line, #c9b993);
    }
    h1 { margin: 0; font: 700 28px/1.1 Georgia, serif; letter-spacing: 0; }
    #status { color: var(--ink-muted, #665f4f); font-size: 13px; }
    .controls {
      display: flex;
      align-items: end;
      flex-wrap: wrap;
      gap: 16px;
      padding: 18px 0;
    }
    .control { display: grid; gap: 6px; }
    label { color: var(--ink-muted, #665f4f); font-size: 12px; font-weight: 650; }
    .segments { display: inline-flex; border: 1px solid var(--line, #c9b993); }
    button, input {
      min-height: 38px;
      border: 1px solid var(--line, #c9b993);
      border-radius: 0;
      background: var(--paper-raised, #fffaf0);
      color: inherit;
      font: inherit;
    }
    .segments button { width: 48px; border: 0; border-right: 1px solid var(--line, #c9b993); }
    .segments button:last-child { border-right: 0; }
    .segments button[aria-pressed="true"] { background: var(--fig-highlight, #d4a747); font-weight: 750; }
    input { width: 92px; padding: 0 10px; }
    #render { padding: 0 18px; background: var(--ink, #17140f); color: var(--paper-bg, #f4ead6); }
    .equations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--line, #c9b993);
      border-bottom: 1px solid var(--line, #c9b993);
    }
    .equation { padding: 14px 18px; font: 600 17px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .equation + .equation { border-left: 1px solid var(--line, #c9b993); }
    .visuals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 430px;
    }
    .visual {
      min-width: 0;
      padding: 20px;
      display: grid;
      grid-template-rows: auto minmax(300px, 1fr) auto;
      gap: 12px;
    }
    .visual + .visual { border-left: 1px solid var(--line, #c9b993); }
    h2 { margin: 0; font-size: 14px; letter-spacing: 0; }
    .stage { min-height: 300px; display: grid; place-items: center; overflow: hidden; }
    .stage svg { width: 100%; height: 100%; max-height: 350px; }
    .caption { min-height: 42px; margin: 0; color: var(--ink-muted, #665f4f); font-size: 13px; line-height: 1.45; }
    .trace {
      padding: 16px 0 28px;
      border-top: 1px solid var(--line, #c9b993);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: baseline;
    }
    #plan { overflow-wrap: anywhere; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
    #validation { font-size: 12px; font-weight: 700; }
    @media (max-width: 760px) {
      .equations, .visuals { grid-template-columns: 1fr; }
      .equation + .equation, .visual + .visual { border-left: 0; border-top: 1px solid var(--line, #c9b993); }
      .trace { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Unit echo</h1>
      <span id="status">Connecting</span>
    </header>

    <section class="controls" aria-label="Unit controls">
      <div class="control">
        <label>Base and denominator</label>
        <div class="segments" id="bases">
          <button type="button" data-base="5" aria-pressed="false">5</button>
          <button type="button" data-base="7" aria-pressed="true">7</button>
          <button type="button" data-base="10" aria-pressed="false">10</button>
          <button type="button" data-base="12" aria-pressed="false">12</button>
        </div>
      </div>
      <div class="control">
        <label for="iterations">Iterations</label>
        <input id="iterations" type="number" min="1" max="48" value="7">
      </div>
      <button id="render" type="button">Render</button>
    </section>

    <section class="equations" aria-live="polite">
      <div class="equation" id="outward">7 ones = 1 seven</div>
      <div class="equation" id="inward">7 x 1/7 = 7/7 = 1</div>
    </section>

    <section class="visuals">
      <article class="visual">
        <h2>Ace of Base</h2>
        <div class="stage" id="ace-stage"></div>
        <p class="caption" id="ace-caption"></p>
      </article>
      <article class="visual">
        <h2>Fraction Bars</h2>
        <div class="stage" id="fraction-stage"></div>
        <p class="caption" id="fraction-caption"></p>
      </article>
    </section>

    <section class="trace">
      <code id="plan"></code>
      <span id="validation"></span>
    </section>
  </main>

  <script src="../render/drawer.js"></script>
  <script>
    (function () {
      'use strict';
      var base = 7;
      var buttons = Array.prototype.slice.call(document.querySelectorAll('[data-base]'));
      var iterations = document.getElementById('iterations');
      var internals = window.HermesDrawer._internal;

      function finalFrame(doc) { return doc.frames[doc.frames.length - 1]; }

      function draw(doc, targetId, captionId) {
        var frame = finalFrame(doc);
        var svg = internals.buildSvg(frame, internals.documentBounds(doc));
        var target = document.getElementById(targetId);
        target.replaceChildren(svg);
        document.getElementById(captionId).textContent = frame.caption || '';
      }

      function setBusy(busy) {
        document.getElementById('render').disabled = busy;
        document.getElementById('status').textContent = busy ? 'Rendering' : 'Prolog witness';
      }

      function render() {
        var count = Math.max(1, Number(iterations.value) || base);
        iterations.value = count;
        setBusy(true);
        fetch('/api/render', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({op: 'unit_echo_render', base: base, iterations: count})
        }).then(function (response) {
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.json();
        }).then(function (doc) {
          draw(doc.aceOfBase, 'ace-stage', 'ace-caption');
          draw(doc.fractionBars, 'fraction-stage', 'fraction-caption');
          document.getElementById('outward').textContent = base + ' ones = 1 base-' + base + ' unit';
          document.getElementById('inward').textContent = count + ' x 1/' + base + ' = ' + count + '/' + base;
          document.getElementById('plan').textContent = doc.spatialRoundTrip.reconstructedPlan.plan;
          document.getElementById('validation').textContent = doc.spatialRoundTrip.validation.status;
          setBusy(false);
        }).catch(function (error) {
          document.getElementById('status').textContent = error.message;
          document.getElementById('render').disabled = false;
        });
      }

      buttons.forEach(function (button) {
        button.addEventListener('click', function () {
          base = Number(button.getAttribute('data-base'));
          iterations.value = base;
          buttons.forEach(function (candidate) {
            candidate.setAttribute('aria-pressed', String(candidate === button));
          });
          render();
        });
      });
      document.getElementById('render').addEventListener('click', render);
      window.addEventListener('DOMContentLoaded', render);
    })();
  </script>
</body>
</html>

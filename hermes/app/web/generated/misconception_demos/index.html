.proof { margin: 10px 0 0; display: grid; grid-template-columns: max-content 1fr; gap: 4px 10px; font-size: 0.78rem; color: #4d4638; }
.proof dt { font-weight: 700; }
.proof dd { margin: 0; overflow-wrap: anywhere; }

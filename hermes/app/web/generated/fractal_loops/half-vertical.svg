<svg xmlns="http://www.w3.org/2000/svg" width="180" height="200" viewBox="0 0 180 200" font-family="Georgia, serif" role="img" aria-label="A circle cut by a straight vertical line into two equal halves. The unlicensed cut, which lands on the same picture at two parts.">
  <text x="90" y="20" text-anchor="middle" font-size="13" fill="#8a4b1a">partition(circle, vertical, 2)</text>
  <text x="90" y="36" text-anchor="middle" font-size="11" fill="#8a4b1a" font-style="italic">[unlicensed]</text>
  <circle cx="90" cy="110" r="62" fill="#fbf1e8" stroke="#8a4b1a" stroke-width="2"/>
  <!-- vertical straight cut through the centre: at n=2 it coincides with the diameter -->
  <line x1="90" y1="48" x2="90" y2="172" stroke="#8a4b1a" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="62" y="115" text-anchor="middle" font-size="20" fill="#8a4b1a">&#189;</text>
  <text x="118" y="115" text-anchor="middle" font-size="20" fill="#8a4b1a">&#189;</text>
  <text x="90" y="195" text-anchor="middle" font-size="11" fill="#555">two equal parts &#8212; same picture</text>
</svg>

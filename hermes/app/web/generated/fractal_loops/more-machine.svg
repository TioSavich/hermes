<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7a8aa0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3fae6f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="720" height="430" fill="#0f141b"/>

  <!-- title -->
  <text x="24" y="30" fill="#e6ecf3" font-size="16" font-weight="600">The More Machine: the matrix grows by reading its own diagonal</text>
  <text x="24" y="48" fill="#7a8aa0" font-size="11">more-zeeman/matrix.html : finitized Cantorian diagonalization (the Diagonal Sandwich that actually runs)</text>

  <!-- ===== the loop: three nodes in a cycle, top band ===== -->

  <!-- D1 node -->
  <rect x="36" y="78" width="180" height="62" rx="6" fill="#16202c" stroke="#3a4a5e" stroke-width="1.5"/>
  <text x="126" y="100" fill="#9fd0ff" font-size="12" font-weight="600" text-anchor="middle">D1 &#183; read own diagonal</text>
  <text x="126" y="117" fill="#cfd9e4" font-size="11" text-anchor="middle">diagonal()  :307</text>
  <text x="126" y="132" fill="#7a8aa0" font-size="10" text-anchor="middle">seed = identity  :312</text>

  <!-- N node -->
  <rect x="270" y="78" width="180" height="62" rx="6" fill="#16202c" stroke="#3a4a5e" stroke-width="1.5"/>
  <text x="360" y="100" fill="#ffd27a" font-size="12" font-weight="600" text-anchor="middle">N &#183; negate the diagonal</text>
  <text x="360" y="117" fill="#cfd9e4" font-size="11" text-anchor="middle">.map(flip)  :363</text>
  <text x="360" y="132" fill="#7a8aa0" font-size="10" text-anchor="middle">flip(v) = 1 - v  :306</text>

  <!-- D2 node -->
  <rect x="504" y="78" width="180" height="62" rx="6" fill="#16202c" stroke="#3a4a5e" stroke-width="1.5"/>
  <text x="594" y="100" fill="#9fffc0" font-size="12" font-weight="600" text-anchor="middle">D2 &#183; write back as new</text>
  <text x="594" y="117" fill="#cfd9e4" font-size="11" text-anchor="middle">push new row+col  :364&#8211;365</text>
  <text x="594" y="132" fill="#7a8aa0" font-size="10" text-anchor="middle">differs from every prior row</text>

  <!-- arrows along the top band -->
  <line x1="216" y1="109" x2="266" y2="109" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="109" x2="500" y2="109" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- the self-reference return edge: D2 feeds the grown matrix back to D1 -->
  <path d="M 594 140 L 594 168 L 126 168 L 126 142" fill="none" stroke="#3fae6f" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="360" y="162" fill="#3fae6f" font-size="10.5" text-anchor="middle">the grown matrix becomes the next diagonal read &#8212; the loop closes on itself</text>

  <!-- ===== the vanishing point: the corner cell ===== -->
  <rect x="270" y="190" width="180" height="58" rx="6" fill="#241a1a" stroke="#a8553a" stroke-width="2"/>
  <text x="360" y="210" fill="#ff9d6e" font-size="11.5" font-weight="600" text-anchor="middle">vanishing point: the corner</text>
  <text x="360" y="226" fill="#e0b9a6" font-size="10.5" text-anchor="middle">m[n][n] = nextSymbol  :365</text>
  <text x="360" y="240" fill="#c79a86" font-size="10" text-anchor="middle">nextSymbol = flip(nextSymbol)  :366</text>

  <!-- arrow from D2 down into the vanishing point -->
  <line x1="594" y1="140" x2="452" y2="200" stroke="#a8553a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- caption for the vanishing point -->
  <text x="24" y="276" fill="#7a8aa0" font-size="10">At the one cell where the new row asserts its own freshness, the code stops diagonalizing</text>
  <text x="24" y="290" fill="#7a8aa0" font-size="10">and writes a metronome tick instead. The numeral entombs whether that cell was forced or merely ticked.</text>

  <!-- ===== captured output: verbatim run of the real addSnap loop ===== -->
  <rect x="24" y="302" width="672" height="116" rx="5" fill="#0a0e13" stroke="#2a3644" stroke-width="1"/>
  <text x="34" y="318" fill="#5f7d8c" font-size="9.5">captured output &#8212; node ran the verbatim addSnap()/diagonal()/flip() from matrix.html (W=1, M=0):</text>

  <text x="34" y="334" fill="#cfd9e4" font-size="9.5" xml:space="preserve">  seed (D1, identity):     W M M        after snap 1:   W M M M        after snap 2:   W M M M M</text>
  <text x="34" y="347" fill="#cfd9e4" font-size="9.5" xml:space="preserve">                           M W M                        M W M M                        M W M M M</text>
  <text x="34" y="360" fill="#cfd9e4" font-size="9.5" xml:space="preserve">                           M M W                        M M W M                        M M W M M</text>
  <text x="34" y="373" fill="#9fffc0" font-size="9.5" xml:space="preserve">                                                        M M M M  &lt;- new row             M M M M W</text>
  <text x="34" y="386" fill="#9fffc0" font-size="9.5" xml:space="preserve">                                                     (flipped diag + corner)            M M M W W  &lt;- new row</text>
  <text x="34" y="402" fill="#ff9d6e" font-size="9.5" xml:space="preserve">  corner stream (the metronome at m[n][n]):  snap1 = M ,  snap2 = W   -- alternates, ignores the diagonal</text>
  <text x="34" y="414" fill="#5f7d8c" font-size="9">  matrix.html keeps full history; more-machine.js mirrors the local move inside a maxSize sliding window.</text>
</svg>

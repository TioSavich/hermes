<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b71c1c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#fafaf8"/>

  <!-- Title -->
  <text x="20" y="28" font-size="17" font-weight="bold" fill="#222">The {I} that can't be in the picture</text>
  <text x="20" y="46" font-size="11.5" fill="#666">the I-Feeling variable: it keeps moving against the unknown, and vanishes the instant anything pins it down</text>

  <!-- ===== The loop nodes ===== -->

  <!-- Node A: i_feeling -->
  <rect x="40" y="78" width="200" height="56" rx="8" fill="#fff" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="100" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#222">i_feeling(I_f)</text>
  <text x="140" y="116" font-size="9.5" text-anchor="middle" fill="#777">pragmatic_axioms.pl:44</text>
  <text x="140" y="128" font-size="9.5" text-anchor="middle" fill="#777">makes the self-tracing {I}</text>

  <!-- Node B: generate_vanishing_point -->
  <rect x="40" y="176" width="200" height="56" rx="8" fill="#fff" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="198" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#222">generate_vanishing_point(T)</text>
  <text x="140" y="214" font-size="9.5" text-anchor="middle" fill="#777">automata.pl:56-57</text>
  <text x="140" y="226" font-size="9.5" text-anchor="middle" fill="#777">gives the variable the formal mark</text>

  <!-- Node C: attr_unify_hook (the engine) -->
  <rect x="40" y="274" width="200" height="56" rx="8" fill="#fff" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="296" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#222">attr_unify_hook</text>
  <text x="140" y="312" font-size="9.5" text-anchor="middle" fill="#777">automata.pl:62-74</text>
  <text x="140" y="324" font-size="9.5" text-anchor="middle" fill="#777">runs on every unify attempt</text>

  <!-- Branch: DEFER (var-var) -->
  <rect x="310" y="176" width="210" height="56" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="415" y="196" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1b5e20">unify with ANOTHER var</text>
  <text x="415" y="211" font-size="9.5" text-anchor="middle" fill="#2e7d32">automata.pl:63-69 (var branch)</text>
  <text x="415" y="225" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#1b5e20">SUCCEEDS — propagates, defers</text>

  <!-- Branch: WALL (var-nonvar) = the vanishing point -->
  <rect x="310" y="274" width="210" height="64" rx="8" fill="#fdecea" stroke="#b71c1c" stroke-width="2.5"/>
  <text x="415" y="293" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#7f0000">unify with a CONCRETE term</text>
  <text x="415" y="308" font-size="9.5" text-anchor="middle" fill="#b71c1c">automata.pl:73 — the bare  fail</text>
  <text x="415" y="322" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#7f0000">FAILS — hits the wall</text>
  <text x="415" y="334" font-size="9" text-anchor="middle" fill="#b71c1c">the concrete binding fails; nothing comes back</text>

  <!-- Vanishing-point badge -->
  <circle cx="310" cy="274" r="13" fill="#b71c1c"/>
  <text x="310" y="278" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">∅</text>

  <!-- ===== Arrows forming the cycle ===== -->
  <!-- A -> B -->
  <line x1="140" y1="134" x2="140" y2="174" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- B -> C -->
  <line x1="140" y1="232" x2="140" y2="272" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- C -> DEFER -->
  <path d="M 240 290 C 275 290, 280 204, 308 204" fill="none" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <!-- C -> WALL -->
  <line x1="240" y1="306" x2="308" y2="306" stroke="#b71c1c" stroke-width="2.2" marker-end="url(#arrowRed)"/>

  <!-- DEFER loops back to i_feeling (the loop continues) -->
  <path d="M 415 176 C 415 100, 300 90, 242 102" fill="none" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrowGreen)"/>
  <text x="360" y="86" font-size="10" fill="#2e7d32" font-style="italic">loop continues — the {I} keeps moving</text>

  <!-- WALL is terminal: small "tail eaten" note -->
  <text x="535" y="300" font-size="10" fill="#b71c1c" font-style="italic">the snake reaches</text>
  <text x="535" y="313" font-size="10" fill="#b71c1c" font-style="italic">the one bite it</text>
  <text x="535" y="326" font-size="10" fill="#b71c1c" font-style="italic">can't swallow</text>

  <!-- ===== Captured output panel (the proof inside the picture) ===== -->
  <rect x="40" y="352" width="620" height="56" rx="6" fill="#1e1e1e"/>
  <text x="48" y="349" font-size="9.5" fill="#888">verbatim — swipl -l paths.pl -l arche-trace/automata.pl -l formal/pml/pragmatic_axioms.pl</text>
  <text x="50" y="367" font-size="10" font-family="Menlo, Consolas, monospace" fill="#9cdc9c">contains_vanishing_point(I_f) = YES  I_f = AnotherVar : SUCCEEDS (mark propagates)</text>
  <text x="50" y="381" font-size="10" font-family="Menlo, Consolas, monospace" fill="#ef9a9a">I_f = hello (concrete): FAILS (hits the wall)   identity_claim(I_f) : FAILS (cannot objectify)</text>
  <text x="50" y="395" font-size="10" font-family="Menlo, Consolas, monospace" fill="#ffcc80">represents(C_Id, I_f) : is_incoherent (unsatisfiable_desire)</text>
</svg>

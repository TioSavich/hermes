<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b21f2d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#fbfbf8"/>

  <!-- Title -->
  <text x="20" y="28" font-size="16" font-weight="bold" fill="#1a1a1a">The prover reads its own rulebook</text>
  <text x="20" y="46" font-size="11" fill="#555">arche-trace/sequent_engine.pl : proves_impl/2  (lines 296&#8211;304)</text>

  <!-- ===== The loop nodes ===== -->

  <!-- D1: self-read -->
  <rect x="40" y="78" width="250" height="58" rx="8" fill="#eaf2fb" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="165" y="100" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a3a5c">D1 &#183; reads its own database</text>
  <text x="165" y="116" font-size="10.5" text-anchor="middle" fill="#1a3a5c" font-family="monospace">clause(Module:proves_impl(</text>
  <text x="165" y="129" font-size="10.5" text-anchor="middle" fill="#1a3a5c" font-family="monospace">(A=&gt;[C]), _), Body)   :298</text>

  <!-- N: the gap / vanishing point -->
  <rect x="410" y="78" width="250" height="58" rx="8" fill="#fdeaea" stroke="#b21f2d" stroke-width="2.5"/>
  <text x="535" y="98" font-size="12" font-weight="bold" text-anchor="middle" fill="#7a1019">N &#183; the rule must differ from itself</text>
  <text x="535" y="115" font-size="10.5" text-anchor="middle" fill="#7a1019" font-family="monospace">copy_term((A,C,Body),</text>
  <text x="535" y="128" font-size="10.5" text-anchor="middle" fill="#7a1019" font-family="monospace">(Ant,Cons,Body2))   :299</text>

  <!-- the renamed-ghost call -->
  <rect x="410" y="186" width="250" height="50" rx="8" fill="#f0f0ea" stroke="#555" stroke-width="1.5"/>
  <text x="535" y="206" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333">call the renamed ghost</text>
  <text x="535" y="223" font-size="10.5" text-anchor="middle" fill="#333" font-family="monospace">call(Module:Body2)   :302</text>

  <!-- D2: re-descend -->
  <rect x="40" y="186" width="250" height="50" rx="8" fill="#eaf6ec" stroke="#2f855a" stroke-width="1.5"/>
  <text x="165" y="206" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#22543d">D2 &#183; feed it back into itself</text>
  <text x="165" y="223" font-size="10.5" text-anchor="middle" fill="#22543d" font-family="monospace">proves_impl([Cons|...]=&gt;...)  :304</text>

  <!-- ===== Loop arrows ===== -->
  <!-- D1 -> N -->
  <line x1="290" y1="107" x2="410" y2="107" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- N -> call -->
  <line x1="535" y1="136" x2="535" y2="186" stroke="#b21f2d" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <!-- call -> D2 -->
  <line x1="410" y1="211" x2="290" y2="211" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- D2 -> back up to D1 (closes the loop) -->
  <line x1="165" y1="186" x2="165" y2="136" stroke="#333" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- loop label -->
  <text x="350" y="166" font-size="10.5" text-anchor="middle" fill="#888" font-style="italic">the rule that ranges over the clauses is itself one of them</text>

  <!-- vanishing-point flag -->
  <text x="535" y="62" font-size="10" text-anchor="middle" fill="#b21f2d" font-weight="bold">&#9660; where the tail is eaten</text>

  <!-- ===== Captured output ===== -->
  <rect x="40" y="262" width="620" height="118" rx="6" fill="#1d1f21" stroke="#444" stroke-width="1"/>
  <text x="52" y="280" font-size="10" fill="#9fd3a0" font-family="monospace">$ swipl -l paths.pl   (then: use_module('arche-trace/sequent_engine'))</text>
  <text x="52" y="298" font-size="10" fill="#d6d6d6" font-family="monospace">?- aggregate_all(count, clause(sequent_engine:proves_impl(_,_),_), N).</text>
  <text x="52" y="312" font-size="10" fill="#f0c674" font-family="monospace">N = 41.</text>
  <text x="52" y="332" font-size="10" fill="#d6d6d6" font-family="monospace">?- sequent_engine:proves(([o(eq(succ(0),succ(0)))] =&gt; [o(eq(0,0))])).</text>
  <text x="52" y="346" font-size="10" fill="#f0c674" font-family="monospace">true.</text>
  <text x="52" y="366" font-size="9" fill="#8a8a8a" font-family="monospace">41 stored proves_impl clauses; the proof of o(eq(0,0)) from o(eq(succ(0),succ(0)))</text>
  <text x="52" y="377" font-size="9" fill="#8a8a8a" font-family="monospace">routes through the MMP rule, which reads the Q2 axiom out of its own database.</text>
</svg>

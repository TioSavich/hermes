<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Shade wrong count (shade 2, not the numerator)  |  area  1/5"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Shade wrong count (shade 2, not the numerator)  |  area  1/5</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/5)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole region. One area, not yet partitioned.</text><g transform="translate(35.64556962025316 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">1 whole (target: 5 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/5)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the host into equal parts correctly. The error is in</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">how many get shaded, next.</text><g transform="translate(417.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><line x1="74" y1="60" x2="74" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="118" y1="60" x2="118" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="162" y1="60" x2="162" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="206" y1="60" x2="206" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">5 equal parts</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/5)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade the wrong number of equal parts. The partition is right;</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">the count shaded is not.</text><g transform="translate(799.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="44" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="44" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="52" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">shaded 2 of 5 (wrong count)</text><rect x="74" y="60" width="44" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="74" y="60" width="44" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="118" y="60" width="44" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="118" y="60" width="44" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="162" y="60" width="44" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="162" y="60" width="44" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="206" y="60" width="44" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="206" y="60" width="44" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect></g></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Shade wrong count (shade 2, not the numerator)  |  circle  1/4"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Shade wrong count (shade 2, not the numerator)  |  circle  1/4</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/4)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole. One region, not yet partitioned.</text><g transform="translate(89.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">1 whole (target: thirds-style 4 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/4)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the host into equal parts correctly. The error is in</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">how many get shaded, next.</text><g transform="translate(471.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="130" y1="110" x2="130" y2="26" stroke="#d4a747" stroke-width="1.4"></line><line x1="130" y1="110" x2="214" y2="110" stroke="#d4a747" stroke-width="1.4"></line><line x1="130" y1="110" x2="130" y2="194" stroke="#d4a747" stroke-width="1.4"></line><line x1="130" y1="110" x2="46" y2="110.00000000000001" stroke="#d4a747" stroke-width="1.4"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">4 equal sectors</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/4)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade the wrong number of equal parts. The partition is right;</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">the count shaded is not.</text><g transform="translate(853.6481481481482 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="130" y1="110" x2="130" y2="26" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="214" y2="110" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="130" y2="194" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="46" y2="110.00000000000001" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">shaded 2 of 4 (wrong count)</text></g></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Unequal partition (equipartition failure)  |  area  1/4"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Unequal partition (equipartition failure)  |  area  1/4</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/4)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole region. One area, not yet partitioned.</text><g transform="translate(35.64556962025316 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">1 whole (target: 4 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/4)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the region into parts of different areas. There is no</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">unit fraction because the parts are unequal.</text><g transform="translate(417.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="67.94117647058823" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="67.94117647058823" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="63.970588235294116" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">4 unequal parts (no equipartition)</text><rect x="97.94117647058823" y="60" width="42.05882352941177" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="97.94117647058823" y="60" width="42.05882352941177" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="140" y="60" width="42.05882352941176" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="140" y="60" width="42.05882352941176" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="182.05882352941177" y="60" width="67.94117647058823" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="182.05882352941177" y="60" width="67.94117647058823" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/4)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade some parts. Because the parts have different areas, the</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">shaded amount is not the intended fraction.</text><g transform="translate(799.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="67.94117647058823" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="67.94117647058823" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="63.970588235294116" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">shaded 1 of 4 unequal parts: not 1/4</text><rect x="97.94117647058823" y="60" width="42.05882352941177" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="97.94117647058823" y="60" width="42.05882352941177" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="140" y="60" width="42.05882352941176" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="140" y="60" width="42.05882352941176" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="182.05882352941177" y="60" width="67.94117647058823" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="182.05882352941177" y="60" width="67.94117647058823" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect></g></svg>

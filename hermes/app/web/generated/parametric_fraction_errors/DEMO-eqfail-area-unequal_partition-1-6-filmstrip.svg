a5446">Shade some parts. Because the parts have different areas, the</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">shaded amount is not the intended fraction.</text><g transform="translate(799.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="47.53086419753086" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="47.53086419753086" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="53.76543209876543" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">shaded 1 of 6 unequal parts: not 1/6</text><rect x="77.53086419753086" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="77.53086419753086" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="114.19753086419752" y="60" width="25.802469135802465" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="114.19753086419752" y="60" width="25.802469135802465" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="139.99999999999997" y="60" width="25.802469135802465" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="139.99999999999997" y="60" width="25.802469135802465" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="165.80246913580243" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="165.80246913580243" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="202.46913580246908" y="60" width="47.53086419753086" height="110" 
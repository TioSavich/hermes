<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Miscount partition (off-by-one)  |  area  1/5"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Miscount partition (off-by-one)  |  area  1/5</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/5)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole region. One area, not yet partitioned.</text><g transform="translate(35.64556962025316 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">1 whole (target: 5 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/5)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the region into equal parts, but make the wrong</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">number: count the cuts, not the regions.</text><g transform="translate(417.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><line x1="66.66666666666666" y1="60" x2="66.66666666666666" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="103.33333333333333" y1="60" x2="103.33333333333333" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="140" y1="60" x2="140" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="176.66666666666666" y1="60" x2="176.66666666666666" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="213.33333333333331" y1="60" x2="213.33333333333331" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">drew 6 equal parts for a 5-part task (off by one)</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/5)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade and read the fraction off the miscounted region. The</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">denominator is off by one.</text><g transform="translate(799.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="36.666666666666664" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="48.33333333333333" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">read 1/6 off a 6-part region (wanted /5)</text><rect x="66.66666666666666" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="66.66666666666666" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="103.33333333333331" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="103.33333333333331" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="139.99999999999997" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="139.99999999999997" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="176.66666666666663" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="176.66666666666663" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="213.3333333333333" y="60" width="36.666666666666664" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="213.3333333333333" y="60" width="36.666666666666664" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect></g></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Miscount partition (off-by-one)  |  area  1/6"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Miscount partition (off-by-one)  |  area  1/6</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/6)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole region. One area, not yet partitioned.</text><g transform="translate(35.64556962025316 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">1 whole (target: 6 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/6)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the region into equal parts, but make the wrong</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">number: count the cuts, not the regions.</text><g transform="translate(417.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="220" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><line x1="61.42857142857143" y1="60" x2="61.42857142857143" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="92.85714285714286" y1="60" x2="92.85714285714286" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="124.28571428571428" y1="60" x2="124.28571428571428" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="155.71428571428572" y1="60" x2="155.71428571428572" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="187.14285714285714" y1="60" x2="187.14285714285714" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><line x1="218.57142857142856" y1="60" x2="218.57142857142856" y2="170" stroke="#0d0c08" stroke-width="0.5"></line><rect x="30" y="60" width="220" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="140" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">drew 7 equal parts for a 6-part task (off by one)</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/6)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade and read the fraction off the miscounted region. The</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">denominator is off by one.</text><g transform="translate(799.6455696202532 66.70886075949367) scale(1.2025316455696202)"><rect x="6" y="36" width="268" height="158" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="60" width="31.428571428571427" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="45.714285714285715" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">read 1/7 off a 7-part region (wanted /6)</text><rect x="61.42857142857143" y="60" width="31.428571428571427" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="61.42857142857143" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="92.85714285714286" y="60" width="31.428571428571427" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="92.85714285714286" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="124.28571428571429" y="60" width="31.428571428571427" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="124.28571428571429" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="155.71428571428572" y="60" width="31.428571428571427" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="155.71428571428572" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="187.14285714285714" y="60" width="31.428571428571427" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="187.14285714285714" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="218.57142857142856" y="60" width="31.428571428571427" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="218.57142857142856" y="60" width="31.428571428571427" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect></g></svg>

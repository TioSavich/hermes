<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Unequal partition (equipartition failure)  |  bar  1/4"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Unequal partition (equipartition failure)  |  bar  1/4</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/4)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole bar. One length, not yet partitioned.</text><g transform="translate(18.130434782608695 99.34782608695653) scale(0.9782608695652174)"><rect x="6" y="46" width="368" height="124" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="70" width="320" height="76" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="70" width="320" height="76" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="190" y="108" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">1 whole (target: 4 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/4)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the bar into parts of different sizes. There is no</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">unit fraction because the parts are unequal.</text><g transform="translate(400.1304347826087 99.34782608695653) scale(0.9782608695652174)"><rect x="6" y="46" width="368" height="124" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="70" width="320" height="76" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="70" width="98.82352941176471" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="128.8235294117647" y="70" width="61.176470588235304" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="190" y="70" width="61.17647058823529" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="251.1764705882353" y="70" width="98.82352941176471" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="70" width="320" height="76" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="190" y="108" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">4 unequal parts (no equipartition)</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/4)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade some parts. Because the parts are unequal, the shaded</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">amount is not the intended fraction.</text><g transform="translate(782.1304347826087 99.34782608695653) scale(0.9782608695652174)"><rect x="6" y="46" width="368" height="124" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="70" width="320" height="76" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="70" width="98.82352941176471" height="76" fill="#b95238" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="128.8235294117647" y="70" width="61.176470588235304" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="190" y="70" width="61.17647058823529" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="251.1764705882353" y="70" width="98.82352941176471" height="76" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="70" width="320" height="76" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="190" y="108" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">shaded 1 of 4 unequal parts: not 1/4</text></g></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Miscount partition (off-by-one)  |  circle  1/6"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Miscount partition (off-by-one)  |  circle  1/6</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/6)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole. One region, not yet partitioned.</text><g transform="translate(89.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">1 whole (target: thirds-style 6 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/6)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Cut the circle into equal sectors, but count the cuts rather</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">than the regions: one too many.</text><g transform="translate(471.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="130" y1="110" x2="130" y2="26" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="195.6738445273145" y2="57.62685664386639" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="211.89394462327317" y2="128.69175845233042" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="166.4462340858749" y2="185.6813849038032" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="93.55376591412512" y2="185.6813849038032" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="48.106055376726815" y2="128.69175845233042" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="64.32615547268549" y2="57.6268566438664" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">drew 7 sectors for a 6-part task (off by one)</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/6)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade and read the fraction off the miscounted figure. The</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">denominator is off by one.</text><g transform="translate(853.6481481481482 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="130" y1="110" x2="130" y2="26" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="195.6738445273145" y2="57.62685664386639" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="211.89394462327317" y2="128.69175845233042" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="166.4462340858749" y2="185.6813849038032" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="93.55376591412512" y2="185.6813849038032" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="48.106055376726815" y2="128.69175845233042" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="64.32615547268549" y2="57.6268566438664" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">read 1/7 off a 7-part figure (wanted /6)</text></g></svg>

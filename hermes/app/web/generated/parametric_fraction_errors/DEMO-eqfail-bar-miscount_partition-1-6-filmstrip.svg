<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Miscount partition (off-by-one)  |  bar  1/6"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Miscount partition (off-by-one)  |  bar  1/6</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/6)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole bar. One length, not yet partitioned.</text><g transform="translate(18.130434782608695 99.34782608695653) scale(0.9782608695652174)"><rect x="6" y="46" width="368" height="124" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="70" width="320" height="76" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="70" width="320" height="76" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="190" y="108" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">1 whole (target: 6 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/6)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Partition the bar into equal parts, but make the wrong number:</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">count the cuts, not the regions.</text><g transform="translate(400.1304347826087 99.34782608695653) scale(0.9782608695652174)"><rect x="6" y="46" width="368" height="124" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="70" width="320" height="76" fill="#cabf9f" 
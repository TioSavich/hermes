<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Miscount partition (off-by-one)  |  circle  1/4"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Miscount partition (off-by-one)  |  circle  1/4</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/4)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole. One region, not yet partitioned.</text><g transform="translate(89.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">1 whole (target: thirds-style 4 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/4)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Cut the circle into equal sectors, but count the cuts rather</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">than the regions: one too many.</text><g transform="translate(471.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="130" y1="110" x2="130" y2="26" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="209.8887473687929" y2="84.04257247250442" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="179.37396119256775" y2="177.95742752749558" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="80.62603880743227" y2="177.95742752749558" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="50.111252631207094" y2="84.04257247250443" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">drew 5 sectors for a 4-part task (off by one)</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/4)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade and read the fraction off the miscounted figure. The</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">denominator is off by one.</text><g transform="translate(853.6481481481482 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="130" y1="110" x2="130" y2="26" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="209.8887473687929" y2="84.04257247250442" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="179.37396119256775" y2="177.95742752749558" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="80.62603880743227" y2="177.95742752749558" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="110" x2="50.111252631207094" y2="84.04257247250443" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">read 1/5 off a 5-part figure (wanted /4)</text></g></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Unequal partition (equipartition failure)  |  circle  1/4"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Unequal partition (equipartition failure)  |  circle  1/4</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/4)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole. One region, not yet partitioned.</text><g transform="translate(89.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">1 whole (target: thirds-style 4 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/4)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Cut the circle with equal-width vertical strips. The strips look</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">even but the pieces are not equal areas.</text><g transform="translate(471.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="88" y1="37.25386608210715" x2="88" y2="182.74613391789285" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="26" x2="130" y2="194" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="172" y1="37.25386608210715" x2="172" y2="182.74613391789285" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">4 vertical strips: equal WIDTH, unequal AREA</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/4)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade some strips. Because the strips are unequal, the shaded</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">amount is not the intended fraction.</text><g transform="translate(853.6481481481482 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><polygon points="46,110 49.5,86.00520889859635 53,76.42917933681096 56.5,69.33367486482211 60,63.5672529350244 63.5,58.67992595484687 67,54.439222467643596 70.5,50.70623978865904 74,47.390096630005885 77.5,44.427521016816826 81,41.772439586337256 84.5,39.39015649358795 88,37.25386608210715 88,182.74613391789285 84.5,180.60984350641206 81,178.22756041366273 77.5,175.57247898318317 74,172.60990336999413 70.5,169.29376021134095 67,165.5607775323564 63.5,161.32007404515312 60,156.43274706497562 56.5,150.66632513517789 53,143.57082066318904 49.5,133.99479110140365 46,110" fill="#b95238" opacity="0.55" stroke="none"></polygon><line x1="88" y1="37.25386608210715" x2="88" y2="182.74613391789285" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="130" y1="26" x2="130" y2="194" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="172" y1="37.25386608210715" x2="172" y2="182.74613391789285" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">shaded 1 of 4 unequal strips: not 1/4</text></g></svg>

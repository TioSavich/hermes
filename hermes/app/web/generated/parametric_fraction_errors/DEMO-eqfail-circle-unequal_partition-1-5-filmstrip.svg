<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1172 336" role="img" aria-label="Unequal partition (equipartition failure)  |  circle  1/5"><rect x="0" y="0" width="1172" height="336" fill="#f8f1df"/><text x="24" y="24" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#1b1810">Unequal partition (equipartition failure)  |  circle  1/5</text><text x="204" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">B. establish_whole (1/5)</text><text x="204" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Establish the whole. One region, not yet partitioned.</text><g transform="translate(89.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">1 whole (target: thirds-style 5 equal parts)</text></g><text x="586" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">M. apply_partition (1/5)</text><text x="586" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Cut the circle with equal-width vertical strips. The strips look</text><text x="586" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">even but the pieces are not equal areas.</text><g transform="translate(471.64814814814815 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><line x1="79.6" y1="42.80000000000001" x2="79.6" y2="177.2" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="113.2" y1="27.697144642485213" x2="113.2" y2="192.30285535751477" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="146.8" y1="27.697144642485213" x2="146.8" y2="192.30285535751477" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="180.4" y1="42.80000000000001" x2="180.4" y2="177.2" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">5 vertical strips: equal WIDTH, unequal AREA</text></g><text x="968" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1b1810">E. shade_parts (1/5)</text><text x="968" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">Shade some strips. Because the strips are unequal, the shaded</text><text x="968" y="91" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5a5446">amount is not the intended fraction.</text><g transform="translate(853.6481481481482 108.24074074074075) scale(0.8796296296296297)"><rect x="22" y="2" width="216" height="216" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><circle cx="130" cy="110" r="84" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></circle><text x="130" y="216" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="14" fill="#1b1810">circle</text><polygon points="46,110 48.8,88.4927919059679 51.6,79.8430770800468 54.4,73.38524887425832 57.199999999999996,68.09343726813188 60,63.5672529350244 62.8,59.6 65.6,56.06819120407698 68.39999999999999,52.890981447760815 71.19999999999999,50.01200120024007 74,47.390096630005885 76.8,44.994154109034156 79.6,42.80000000000001 79.6,177.2 76.8,175.00584589096584 74,172.60990336999413 71.19999999999999,169.98799879975994 68.39999999999999,167.10901855223918 65.6,163.93180879592302 62.8,160.4 60,156.43274706497562 57.199999999999996,151.90656273186812 54.4,146.6147511257417 51.6,140.1569229199532 48.8,131.50720809403208 46,110" fill="#b95238" opacity="0.55" stroke="none"></polygon><line x1="79.6" y1="42.80000000000001" x2="79.6" y2="177.2" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="113.2" y1="27.697144642485213" x2="113.2" y2="192.30285535751477" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="146.8" y1="27.697144642485213" x2="146.8" y2="192.30285535751477" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><line x1="180.4" y1="42.80000000000001" x2="180.4" y2="177.2" stroke="#b95238" stroke-width="2.4" stroke-dasharray="9 5"></line><text x="130" y="6" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="13" fill="#1b1810">shaded 1 of 5 unequal strips: not 1/5</text></g></svg>

nt-size="22" fill="#1b1810">task whole</text><rect x="290" y="60" width="30.25" height="110" fill="#b95238" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="290" y="60" width="30.25" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="305.125" y="115" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="22" fill="#1b1810">1/4 of the WRONG whole</text><rect x="320.25" y="60" width="30.25" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="320.25" y="60" width="30.25" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="350.5" y="60" width="30.25" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="350.5" y="60" width="30.25" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="380.75" y="60" width="30.25" height="110" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="380.75" y="60" width="30.25" height="110" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect></g></svg>

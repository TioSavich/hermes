<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img"><rect x="0" y="0" width="980" height="300" fill="#f8f1df"/><text x="172" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1b1810">Partition</text><text x="172" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5a5446">Partition the whole into 5 equal parts.</text><g transform="translate(16.82758620689655 84.3448275862069) scale(0.8620689655172413)"><rect x="6" y="16" width="348" height="118" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="180" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">1 whole / 5</text></g><text x="490" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1b1810">Iterate 3/5</text><text x="490" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5a5446">Iterate the unit fraction 3 times, within the whole.</text><g transform="translate(334.82758620689657 84.3448275862069) scale(0.8620689655172413)"><rect x="6" y="16" width="348" height="118" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="90" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="150" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="180" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">3/5</text></g><text x="808" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1b1810">Intact</text><text x="808" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5a5446">Chain intact: the referent whole is preserved.</text><g transform="translate(652.8275862068965 84.3448275862069) scale(0.8620689655172413)"><rect x="6" y="16" width="348" height="118" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="90" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="150" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="180" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">3/5 ✓</text></g></svg>

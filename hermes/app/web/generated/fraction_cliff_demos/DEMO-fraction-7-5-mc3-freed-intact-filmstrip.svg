<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img"><rect x="0" y="0" width="980" height="300" fill="#f8f1df"/><text x="172" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1b1810">5/5 = 1</text><text x="172" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5a5446">Partition the whole into 5; iterate to 5/5 = 1 whole.</text><g transform="translate(19.383720930232556 116.29651162790697) scale(0.436046511627907)"><rect x="6" y="16" width="688" height="118" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="90" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="150" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="210" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="270" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="180" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">5/5 = 1</text></g><text x="490" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1b1810">Free unit</text><text x="490" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5a5446">Free the unit fraction so it can iterate past the whole.</text><g transform="translate(337.3837209302326 116.29651162790697) scale(0.436046511627907)"><rect x="6" y="16" width="688" height="118" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="90" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="150" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="210" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="270" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="180" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">5/5</text><rect x="370" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="370" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="520" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">freed 1/5</text></g><text x="808" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1b1810">7/5 intact (mc3)</text><text x="808" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5a5446">Iterate 2 more 1/5-units beyond: 7/5, chain intact.</text><g transform="translate(655.3837209302326 116.29651162790697) scale(0.436046511627907)"><rect x="6" y="16" width="688" height="118" fill="#f8f1df" stroke="#0d0c08" stroke-width="0"></rect><rect x="30" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="30" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="90" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="150" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="210" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="270" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="30" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="180" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">5/5</text><rect x="370" y="40" width="300" height="70" fill="#cabf9f" stroke="#0d0c08" stroke-width="1.5"></rect><rect x="370" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="430" y="40" width="60" height="70" fill="#d4a747" stroke="#0d0c08" stroke-width="0.75"></rect><rect x="370" y="40" width="300" height="70" fill="none" stroke="#0d0c08" stroke-width="1.5"></rect><text x="520" y="75" text-anchor="middle" dominant-baseline="central" font-family="Georgia, &quot;Times New Roman&quot;, serif" font-size="20" fill="#1b1810">+2/5 → 7/5 ✓</text></g></svg>

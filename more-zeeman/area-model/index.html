<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Area model — Hermes filmstrip</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Crect%20width='16'%20height='16'%20fill='%23f4ead6'/%3E%3Crect%20x='1.5'%20y='3'%20width='13'%20height='10'%20fill='none'%20stroke='%230d0c08'%20stroke-width='0.8'/%3E%3Crect%20x='4'%20y='3'%20width='0.8'%20height='10'%20fill='%230d0c08'/%3E%3Crect%20x='11.2'%20y='3'%20width='0.8'%20height='10'%20fill='%230d0c08'/%3E%3Crect%20x='6.5'%20y='6'%20width='3'%20height='4'%20fill='%23d4a747'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../hermes-tokens.css">
  <link rel="stylesheet" href="../render/host.css">
  <script defer src="../render/hermes-shell.js" data-root="../" data-app="/" data-active="area-model"></script>
</head>
<body class="view-freshman" data-hshell-fit="1">
  <div class="wrap">
    <header class="host-head">
      <div>
        <h1>Area model</h1>
        <p class="subhead">Multiplication as a grid of unit squares; partial products as labelled sub-rectangles. Drawn from the array witness.</p>
      </div>
      <nav class="view-toggle" aria-label="audience">
        <button data-view="freshman" class="active">student</button>
        <button data-view="teacher">teacher</button>
        <button data-view="philosopher">researcher</button>
      </nav>
    </header>

    <div id="stage" class="stage"></div>

    <div class="rail">
    <div class="meta-line">
      <span id="context"></span>
      <span id="result"></span>
    </div>

    <div class="controls">
      <button id="prev">&larr; Prev</button>
      <input id="seek" type="range" min="0" max="0" value="0">
      <button id="next">Next &rarr;</button>
      <button id="play">Play</button>
      <span id="counter" class="counter"></span>
      <span id="annotation-flag" class="annot">annotation only</span>
      <button id="download">SVG</button>
    </div>

    <p id="caption" class="caption only-freshman"></p>

    <section class="panel only-philosopher">
      <h2>Formal signature</h2>
      <code id="tuple" class="tuple"></code>
      <div id="verbs" class="verbs"></div>
      <h3>Grounding (Lakoff &amp; N&uacute;&ntilde;ez)</h3>
      <div id="grounding" class="band"></div>
    </section>

    <section class="panel only-teacher">
      <h2>Teacher layer</h2>
      <div id="teacher" class="band"></div>
    </section>

    <section class="calc-bar">
      <input type="hidden" data-arg="kind" value="array_multiplication">
      <label>rows <input data-arg="a" type="number" value="3"></label>
      <label>cols <input data-arg="b" type="number" value="4"></label>
      <button id="calculate">Calculate</button>
      <span class="calc-note">POSTs to the worker; renders the returned witness frames.</span>
    </section>
    </div><!-- .rail -->
  </div>

  <script type="application/json" id="frames">{"canvas": {"height": 520, "width": 700}, "frames": [{"caption": "3 rows by 4 columns = 12 cells.", "scene": {"cols": 4, "format": "area-model", "gridlines": {"h": [40, 88, 136, 184], "v": [40, 104, 168, 232, 296]}, "rects": [{"cellH": 48, "cellW": 64, "cols": 4, "h": 144, "kind": "grid", "label": "", "role": "highlight", "rows": 3, "w": 256, "x": 40, "y": 40}], "rows": 3, "version": 2}, "sceneChanged": true, "step": 1, "verb": "array_multiplication(3,4)"}], "grounding": {"metaphor_gloss": "Object Collection \u2014 numbers as collections of discrete objects", "metaphor_label": "object_collection", "practice": "p_rigorous_counting_procedure", "primitive": "'P5'", "role": "primary"}, "kind": "array_multiplication", "request": {"cols": 4, "rows": 3}, "result": "12", "teacher": {"breaks_at": [{"inference": "fractions_of_a_unit", "reason": "Object collections are discrete; there are no 'fractional collections'."}, {"inference": "irrational_numbers", "reason": "Irrationals have no source-domain referent as a collection."}, {"inference": "zero_as_a_number", "reason": "No source-domain referent for 'a collection of nothing'; requires the ad-hoc Zero Collection Metaphor to supply the additive identity."}], "embodied": "Pool collections of objects together and count the result.", "repair": "Switch to Object Construction.", "standard": "diagnostic strand: rigorous_counting_procedure", "witness": {"channels": {"breaks_at": "present", "embodied": "present", "incompatibility_penumbra": "thin", "standard": "present"}, "kind": "teacher_layer", "metaphor_id": "arithmetic_is_object_collection", "practice": "p_rigorous_counting_procedure", "source": "teacher_layer_composition_over_existing_witnesses"}}, "tuple": "array_multiplication(3, 4) -> rows x cols"}</script>
  <script src="../render/drawer.js"></script>
  <script>
    HermesDrawer.create({ op: 'area_render', endpoint: '/api/render', defaultView: 'freshman' });
  </script>
</body>
</html>

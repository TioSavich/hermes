<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes: Grounding witnesses</title><link rel="stylesheet" href="hermes-tokens.css">
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="render/hermes-shell.js" data-root="./" data-app="/" data-active="grounding-witnesses"></script>
  <style>*{box-sizing:border-box}body{margin:0;background:var(--paper,#f4ead6);color:var(--ink,#0d0c08);font:16px/1.5 var(--serif,Georgia,serif)}main{max-width:1080px;margin:auto;padding:2.2rem 1.4rem 4rem}.lede,.status,.note{color:var(--muted,#665f4f);max-width:76ch}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:.8rem;margin-top:1.5rem}form{padding:1rem;border:1px solid var(--line,#b8aa8b);border-radius:10px;background:var(--paper-cool,#ede4cf)}h2{font:600 .88rem var(--mono,monospace);overflow-wrap:anywhere}label{display:block;margin-top:.5rem;color:var(--muted,#665f4f);font-size:.86rem}input{width:100%;padding:.5rem;margin-top:.2rem;border:1px solid var(--line,#b8aa8b);border-radius:5px;background:#fffdf7;font:inherit}button{margin-top:.75rem;padding:.5rem .8rem;border:0;border-radius:5px;background:var(--gold-deep,#8b641c);color:#fff}output{display:block;white-space:pre-wrap;overflow-wrap:anywhere;margin-top:.7rem;font:.8rem/1.4 var(--mono,monospace)}.error{color:#842d24}</style>
</head><body><main><h1>Grounding witnesses</h1><p class="lede">These controls query loaded grounding, representation, corpus, and commitment records. Each result stays within the named relation’s finite scope.</p><p id="status" class="status">Loading controls from the local worker…</p><div id="controls" class="controls"></div></main>
<script>(function(){"use strict";
var OPS=["image_schema","primitive_for_practice","grounding_inference_witness","commitment_match","corpus_grammar_summary","elaborations","representation_spine_witness","target_expressive_power_witness"];
var schema={image_schema:{practice:"p_count_on_from_larger"},primitive_for_practice:{practice:"p_count_on_from_larger"},grounding_inference_witness:{metaphor:"arithmetic_is_object_collection",inference:"commutativity_of_addition"},commitment_match:{content:"A square is a rectangle because it has four right angles."},corpus_grammar_summary:{},elaborations:{},representation_spine_witness:{concept:"fraction"},target_expressive_power_witness:{target:"fraction_addition"}};
function control(item){var form=document.createElement("form"),h=document.createElement("h2"),out=document.createElement("output");h.textContent=item.name;form.appendChild(h);if(item.name==="elaborations"){var n=document.createElement("p");n.className="note";n.textContent="This computes the analyzer on request and may take a moment.";form.appendChild(n)}Object.keys(schema[item.name]).forEach(function(name){var l=document.createElement("label"),i=document.createElement("input");l.textContent=name+(name==="practice"?" (loaded practice atom)":" (term or text read by the clause)");i.name=name;i.required=true;i.value=schema[item.name][name];l.appendChild(i);form.appendChild(l)});var b=document.createElement("button");b.textContent="Request witness";form.appendChild(b);form.appendChild(out);form.onsubmit=function(e){e.preventDefault();var p={op:item.name};Object.keys(schema[item.name]).forEach(function(n){p[n]=form.elements.namedItem(n).value});out.textContent="Requesting…";fetch("/api/witness/grounding",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)}).then(function(r){return r.json().then(function(x){return{ok:r.ok,x:x}})}).then(function(q){out.className=q.ok&&q.x.ok?"":"error";out.textContent=JSON.stringify(q.x.result||q.x.error||q.x,null,2)}).catch(function(x){out.className="error";out.textContent="Request failed: "+x.message})};return form}
fetch("/api/capabilities").then(function(r){return r.json()}).then(function(data){var found={};(data.capabilities||[]).forEach(function(x){if(OPS.indexOf(x.name)>=0)found[x.name]=x});var missing=OPS.filter(function(x){return !found[x]});if(missing.length)throw new Error("registry is missing: "+missing.join(", "));OPS.forEach(function(x){document.getElementById("controls").appendChild(control(found[x]))});document.getElementById("status").textContent="Controls built from the local capability registry."}).catch(function(e){document.getElementById("status").className="status error";document.getElementById("status").textContent="Controls unavailable: "+e.message});
}());</script></body></html>

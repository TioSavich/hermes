<!DOCTYPE html>
<html lang="en" data-page-id="expressive-power-comparison">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expressive Power Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hermes-tokens-dark.css">
  <script defer src="render/hermes-shell.js" data-root="./"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      margin: 0 auto;
      max-width: 1180px;
      padding: 2.25rem 1.25rem 4rem;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      font-weight: 600;
      line-height: 1.08;
      letter-spacing: 0;
    }
    h2 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0;
      margin-top: 0.25rem;
    }
    h3 {
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0;
    }
    a { color: var(--lx); }
    code, .mono {
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .sub {
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 78ch;
      margin-top: 0.65rem;
    }
    .data-source {
      color: var(--muted);
      font-size: 0.86rem;
      max-width: 78ch;
      margin-top: 0.9rem;
    }
    .badge {
      border: 1px solid var(--border);
      border-radius: 4px;
      display: inline-block;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-right: 0.45rem;
      padding: 0.08rem 0.5rem;
      text-transform: uppercase;
    }
    .badge.live { border-color: var(--release); color: var(--release); }
    .badge.snapshot { border-color: var(--tension); color: var(--tension); }
    .claim-register {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      margin-top: 1.25rem;
    }
    .claim {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 0.85rem 1rem;
    }
    .claim b {
      display: block;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.76rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: var(--snap);
    }
    .claim span {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.75rem;
      margin: 1.5rem 0 0;
    }
    .summary-row {
      border-left: 3px solid var(--border);
      background: var(--surface);
      padding: 0.8rem 0.9rem;
      min-height: 7.25rem;
    }
    .summary-row.im-leads { border-left-color: var(--release); }
    .summary-row.trad-leads { border-left-color: var(--tension); }
    .summary-row.mixed { border-left-color: var(--snap); }
    .summary-row .standard {
      display: block;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.86rem;
      font-weight: 600;
    }
    .summary-row .lead {
      color: var(--muted);
      display: block;
      font-size: 0.84rem;
      margin-top: 0.3rem;
    }
    .audit {
      border-top: 1px solid var(--border);
      margin-top: 1.7rem;
      padding-top: 1.35rem;
    }
    .audit-grid {
      display: grid;
      gap: 0.55rem;
      margin-top: 0.85rem;
    }
    .audit-row {
      align-items: start;
      background: var(--surface);
      border-left: 3px solid var(--release);
      display: grid;
      gap: 0.7rem;
      grid-template-columns: minmax(180px, 1fr) minmax(150px, 0.7fr) minmax(0, 1.4fr);
      padding: 0.75rem 0.85rem;
    }
    .audit-row.review { border-left-color: var(--tension); }
    .audit-code {
      display: block;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .audit-meta {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
      margin-top: 0.25rem;
    }
    .audit-counts,
    .audit-issues {
      color: var(--muted);
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.76rem;
      overflow-wrap: anywhere;
    }
    .audit-status {
      color: var(--text);
      display: block;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .pair {
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      padding-top: 1.7rem;
    }
    .pair-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 1rem;
      align-items: start;
    }
    .pair-title {
      color: var(--muted);
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
    }
    .delta-pill {
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.76rem;
      padding: 0.35rem 0.55rem;
      white-space: nowrap;
    }
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
      margin-top: 1rem;
    }
    .lesson-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      min-width: 0;
    }
    .lesson-panel.im { border-top: 3px solid var(--release); }
    .lesson-panel.traditional { border-top: 3px solid var(--tension); }
    .lesson-code {
      color: var(--muted);
      display: block;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      overflow-wrap: anywhere;
      margin-bottom: 0.35rem;
    }
    .lesson-meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.8rem;
      font-size: 0.82rem;
      margin-top: 0.5rem;
    }
    .axis-table {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 1rem;
      overflow: hidden;
    }
    .axis-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.8fr) minmax(0, 1fr) minmax(0, 1fr) minmax(120px, 0.7fr);
      min-height: 4.25rem;
    }
    .axis-row + .axis-row { border-top: 1px solid var(--border); }
    .axis-cell {
      padding: 0.75rem;
      min-width: 0;
    }
    .axis-cell + .axis-cell { border-left: 1px solid var(--border); }
    .axis-label {
      color: var(--muted);
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .axis-value {
      display: block;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 0.45rem;
    }
    .bar-track {
      background: rgba(58, 52, 40, 0.55);
      border-radius: 999px;
      height: 0.55rem;
      overflow: hidden;
      width: 100%;
    }
    .bar {
      background: var(--release);
      border-radius: inherit;
      height: 100%;
      min-width: 0.35rem;
    }
    .traditional .bar { background: var(--tension); }
    .provenance {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 0.45rem;
    }
    .delta {
      color: var(--muted);
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.86rem;
    }
    .delta strong {
      color: var(--text);
      display: block;
      font-size: 1.05rem;
      margin-bottom: 0.25rem;
    }
    .delta.im { color: var(--release); }
    .delta.traditional { color: var(--tension); }
    .delta.neutral { color: var(--neutral); }
    .source-block {
      border-top: 1px solid var(--border);
      margin-top: 1rem;
      padding-top: 0.8rem;
    }
    summary {
      cursor: pointer;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      font-weight: 600;
      list-style-position: outside;
    }
    .evidence-list {
      display: grid;
      gap: 0.55rem;
      list-style: none;
      margin: 0.75rem 0 0;
      padding: 0;
    }
    .evidence-list li {
      border-left: 2px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      padding-left: 0.65rem;
      overflow-wrap: anywhere;
    }
    .tag {
      color: var(--text);
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.76rem;
      font-weight: 600;
    }
    .loading, .error {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      margin-top: 1.5rem;
      padding: 1rem;
    }
    @media (max-width: 820px) {
      body { padding: 1.5rem 0.9rem 3rem; }
      .claim-register,
      .lesson-grid,
      .pair-head { grid-template-columns: 1fr; }
      .axis-row {
        grid-template-columns: 1fr;
      }
      .audit-row {
        grid-template-columns: 1fr;
      }
      .axis-cell + .axis-cell {
        border-left: 0;
        border-top: 1px solid var(--border);
      }
      .delta-pill { white-space: normal; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Expressive Power Comparison</h1>
    <p class="sub">
      IM lessons and cited Ray-style traditional lessons are paired by standard.
      Each report shows the expressive power the lesson puts in play, not an
      empirical classroom outcome.
    </p>
    <p class="data-source" id="data-source"></p>
    <div class="claim-register" id="claim-register"></div>
  </header>

  <section class="summary" id="summary"></section>
  <section class="audit" id="wiring-audit"></section>
  <main id="reports">
    <div class="loading">Loading <code>data/expressive_power_comparison.json</code>...</div>
  </main>

  <script>
    'use strict';

    // Live-with-fallback, same pattern as scoreboard.html: the saved comparison
    // document carries the curated structure (pairing by standard, provenance,
    // citations, hyperedge deltas, wiring audit); the per-lesson counts are
    // refreshed from the live Hermes worker (/api/expressive_power) when it
    // answers, and the page names which of the two it is serving.
    const DATA_URL = 'data/expressive_power_comparison.json';
    const WORKER_BASE = location.protocol === 'file:' ? 'http://127.0.0.1:8765' : '';
    // The three per-lesson counts the live op reports; the axis deltas over
    // these are recomputed when live counts arrive.
    const LIVE_COUNT_KEYS = [
      'proof_paths',
      'strategy_incompatibilities',
      'misconception_incompatibilities'
    ];

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function el(tag, cls, html) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (html !== undefined) node.innerHTML = html;
      return node;
    }

    function numericDelta(value) {
      return Number.isFinite(value) ? value : null;
    }

    function signed(value) {
      if (!Number.isFinite(value)) return 'not comparable';
      if (value > 0) return '+' + value;
      return String(value);
    }

    function deltaClass(value) {
      if (!Number.isFinite(value) || value === 0) return 'neutral';
      return value > 0 ? 'im' : 'traditional';
    }

    function deltaText(axis, value) {
      if (value && typeof value === 'object') {
        return `<strong>not comparable</strong>${esc(value.reason || value.status)}`;
      }
      const n = numericDelta(value);
      const leader = n > 0 ? 'IM leads' : (n < 0 ? 'traditional leads' : 'tie');
      return `<strong>${esc(signed(n))}</strong>${esc(axis)} delta, ${leader}`;
    }

    function maxFor(imValue, traditionalValue) {
      return Math.max(1, Number(imValue) || 0, Number(traditionalValue) || 0);
    }

    function axisRow(label, imValue, traditionalValue, deltaValue, provenance) {
      const max = maxFor(imValue, traditionalValue);
      const imWidth = Math.max(0, Math.min(100, ((Number(imValue) || 0) / max) * 100));
      const tradWidth = Math.max(0, Math.min(100, ((Number(traditionalValue) || 0) / max) * 100));
      const delta = numericDelta(deltaValue);
      const row = el('div', 'axis-row');
      row.appendChild(el('div', 'axis-cell axis-label', esc(label)));
      row.appendChild(el('div', 'axis-cell im',
        `<span class="axis-value">${esc(imValue)}</span>` +
        `<div class="bar-track"><div class="bar" style="width:${imWidth}%"></div></div>` +
        `<p class="provenance">${esc(provenance)}</p>`));
      row.appendChild(el('div', 'axis-cell traditional',
        `<span class="axis-value">${esc(traditionalValue)}</span>` +
        `<div class="bar-track"><div class="bar" style="width:${tradWidth}%"></div></div>` +
        `<p class="provenance">${esc(provenance)}</p>`));
      row.appendChild(el('div', `axis-cell delta ${deltaClass(delta)}`, deltaText(label, deltaValue)));
      return row;
    }

    function citationUrl(text) {
      const match = String(text || '').match(/https?:\/\/[^")\s]+/);
      return match ? match[0] : null;
    }

    function evidenceItems(items, labelFor) {
      if (!items || items.length === 0) return '<li>No rows.</li>';
      return items.map(item => {
        const cite = (item.citations || []).slice(0, 2).map(c => `<br>${esc(c)}`).join('');
        return `<li><span class="tag">${esc(labelFor(item))}</span> ` +
          `${esc(item.provenance || 'unspecified')}${cite}</li>`;
      }).join('');
    }

    function citationItems(citations, sources) {
      const rows = [];
      (citations || []).forEach(c => rows.push(c));
      (sources || []).forEach(s => rows.push(s));
      if (rows.length === 0) return '<li>No citations recorded.</li>';
      return rows.map(row => {
        const url = citationUrl(row);
        const link = url ? ` <a href="${esc(url)}">${esc(url)}</a>` : '';
        return `<li>${esc(row)}${link}</li>`;
      }).join('');
    }

    function allSources(lesson) {
      const rows = [];
      (lesson.strategies || []).forEach(s => rows.push(...(s.sources || [])));
      (lesson.misconceptions || []).forEach(m => rows.push(...(m.sources || [])));
      return Array.from(new Set(rows));
    }

    function lessonPanel(lesson, kind) {
      const panel = el('article', `lesson-panel ${kind}`);
      panel.appendChild(el('span', 'lesson-code', esc(lesson.code)));
      panel.appendChild(el('h3', null, esc(lesson.title)));
      panel.appendChild(el('div', 'lesson-meta',
        `<span>${esc(lesson.grade)}</span><span>${esc(lesson.unit)}</span><span>${esc(lesson.lesson)}</span>`));

      const report = lesson.report || {};
      panel.appendChild(el('div', 'lesson-meta',
        `<span><b>${esc(report.strategy_count || 0)}</b> strategies</span>` +
        `<span><b>${esc(report.misconception_count || 0)}</b> misconceptions</span>`));

      const strategies = el('details', 'source-block');
      strategies.open = true;
      strategies.appendChild(el('summary', null, 'Strategy provenance'));
      strategies.appendChild(el('ul', 'evidence-list',
        evidenceItems(lesson.strategies, item => `${item.operation}:${item.kind}`)));
      panel.appendChild(strategies);

      const misconceptions = el('details', 'source-block');
      misconceptions.open = true;
      misconceptions.appendChild(el('summary', null, 'Misconception provenance'));
      misconceptions.appendChild(el('ul', 'evidence-list',
        evidenceItems(lesson.misconceptions, item => `${item.operation}:${item.name}`)));
      panel.appendChild(misconceptions);

      const citations = el('details', 'source-block');
      citations.open = kind === 'traditional';
      citations.appendChild(el('summary', null, 'Citations and source anchors'));
      citations.appendChild(el('ul', 'evidence-list', citationItems(lesson.citations, allSources(lesson))));
      panel.appendChild(citations);
      return panel;
    }

    function pairLead(pair) {
      const values = [
        pair.delta.strategy_incompatibilities,
        pair.delta.misconception_incompatibilities,
        pair.delta.emergent_hyperedges
      ].filter(Number.isFinite);
      if (values.length === 0) return 'mixed';
      const positives = values.filter(v => v > 0).length;
      const negatives = values.filter(v => v < 0).length;
      if (positives > 0 && negatives === 0) return 'im-leads';
      if (negatives > 0 && positives === 0) return 'trad-leads';
      return 'mixed';
    }

    function renderSummary(pairs) {
      const summary = document.getElementById('summary');
      summary.innerHTML = '';
      pairs.forEach(pair => {
        const cls = pairLead(pair);
        const row = el('div', `summary-row ${cls}`);
        row.innerHTML =
          `<span class="standard">${esc(pair.standard.label)}</span>` +
          `<span class="lead">strategy ${esc(signed(pair.delta.strategy_incompatibilities))}</span>` +
          `<span class="lead">misconception ${esc(signed(pair.delta.misconception_incompatibilities))}</span>` +
          `<span class="lead">hyperedge ${esc(signed(pair.delta.emergent_hyperedges))}</span>`;
        summary.appendChild(row);
      });
    }

    function renderClaimRegister(register) {
      const root = document.getElementById('claim-register');
      root.innerHTML = '';
      [
        ['structural_claim', 'structural claim'],
        ['understanding_hypothesis', 'understanding hypothesis'],
        ['decentering_link', 'decentering link']
      ].forEach(([key, label]) => {
        if (!register[key]) return;
        root.appendChild(el('div', 'claim',
          `<b>${esc(label)}</b><span>${esc(register[key])}</span>`));
      });
    }

    function renderWiringAudit(rows) {
      const root = document.getElementById('wiring-audit');
      root.innerHTML = '';
      if (!rows || rows.length === 0) return;
      root.appendChild(el('h2', null, 'Lesson Wiring Audit'));
      const grid = el('div', 'audit-grid');
      rows.forEach(row => {
        const counts = row.counts || {};
        const issues = row.issues || [];
        const status = row.status === 'ok' ? 'ok' : 'review';
        const node = el('div', `audit-row ${status}`);
        node.innerHTML =
          `<div><span class="audit-code">${esc(row.code)}</span>` +
          `<span class="audit-meta">${esc(row.role)} · ${esc((row.standard || {}).label || '')}</span></div>` +
          `<div class="audit-counts"><span class="audit-status">${esc(status)}</span>` +
          `S ${esc(counts.strategies || 0)} · M ${esc(counts.misconceptions || 0)} · ` +
          `C ${esc(counts.citations || 0)} · clusters ${esc(counts.clusters || 0)}</div>` +
          `<div class="audit-issues">${issues.length ? esc(issues.join('; ')) : 'no audit issues'}</div>`;
        grid.appendChild(node);
      });
      root.appendChild(grid);
    }

    function renderPair(pair) {
      const imReport = pair.im.report;
      const tradReport = pair.traditional.report;
      const section = el('section', 'pair');
      section.appendChild(el('div', 'pair-head',
        `<div><p class="pair-title">${esc(pair.standard.label)}</p><h2>${esc(pair.im.code)} vs ${esc(pair.traditional.code)}</h2></div>` +
        `<div class="delta-pill">delta is IM minus traditional</div>`));

      const axis = el('div', 'axis-table');
      const computed = 'Prolog report from registered lesson vocabulary and source-tagged evidence rows.';
      axis.appendChild(axisRow('proof paths',
        imReport.proof_paths, tradReport.proof_paths, pair.delta.proof_paths, computed));
      axis.appendChild(axisRow('strategy incompatibilities',
        imReport.strategy_incompatibilities, tradReport.strategy_incompatibilities,
        pair.delta.strategy_incompatibilities, computed));
      axis.appendChild(axisRow('misconception incompatibilities',
        imReport.misconception_incompatibilities, tradReport.misconception_incompatibilities,
        pair.delta.misconception_incompatibilities, computed));
      section.appendChild(axis);

      const grid = el('div', 'lesson-grid');
      grid.appendChild(lessonPanel(pair.im, 'im'));
      grid.appendChild(lessonPanel(pair.traditional, 'traditional'));
      section.appendChild(grid);
      return section;
    }

    function setDataSource(html) {
      document.getElementById('data-source').innerHTML = html;
    }

    // Ask the live worker for one lesson's expressive-power counts. The route
    // returns {ok:true, result:{lesson, resolved, expressive_power}}; a lesson
    // the worker cannot resolve counts as a live failure so the page never
    // mixes live and frozen numbers.
    function fetchLiveCounts(code) {
      return fetch(WORKER_BASE + '/api/expressive_power', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lesson: code })
      }).then(r => {
        if (!r.ok) throw new Error('worker responded ' + r.status);
        return r.json();
      }).then(j => {
        if (j && j.error) throw new Error(j.error);
        const res = j && j.result ? j.result : j;
        if (!res || res.resolved !== true || !res.expressive_power) {
          throw new Error(code + ' did not resolve on the live worker');
        }
        return res.expressive_power;
      });
    }

    // Refresh every lesson's counts from the worker, then recompute the count
    // deltas. A delta the export marked non-commensurable stays as exported:
    // that marker records a judgment about operation regions, not a count.
    // delta.emergent_hyperedges also stays as exported; the live op does not
    // report hyperedges.
    function refreshFromWorker(data) {
      const lessons = [];
      (data.pairs || []).forEach(pair => { lessons.push(pair.im, pair.traditional); });
      return Promise.all(lessons.map(lesson => fetchLiveCounts(lesson.code)))
        .then(counts => {
          lessons.forEach((lesson, i) => {
            const ep = counts[i];
            lesson.report = Object.assign({}, lesson.report, {
              proof_paths: ep.proof_paths,
              strategy_incompatibilities: ep.strategy_incompatibilities,
              misconception_incompatibilities: ep.misconception_incompatibilities
            });
          });
          (data.pairs || []).forEach(pair => {
            LIVE_COUNT_KEYS.forEach(key => {
              if (Number.isFinite(pair.delta[key])) {
                pair.delta[key] =
                  (Number(pair.im.report[key]) || 0) -
                  (Number(pair.traditional.report[key]) || 0);
              }
            });
          });
          return data;
        });
    }

    function renderAll(data) {
      renderClaimRegister(data.claim_register || {});
      renderSummary(data.pairs || []);
      renderWiringAudit(data.wiring_audit || []);
      const reports = document.getElementById('reports');
      reports.innerHTML = '';
      (data.pairs || []).forEach(pair => reports.appendChild(renderPair(pair)));
    }

    fetch(DATA_URL)
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(data => {
        setDataSource('Asking the Hermes worker for fresh counts…');
        return refreshFromWorker(data)
          .then(fresh => {
            renderAll(fresh);
            setDataSource('<span class="badge live">live counts</span>' +
              'Per-lesson counts and the count deltas come from the Hermes worker ' +
              '(<code>/api/expressive_power</code>). Pairing, provenance, citations, ' +
              'hyperedge deltas, and the wiring audit come from the saved comparison ' +
              'document <code>' + esc(DATA_URL) + '</code>.');
          })
          .catch(liveErr => {
            renderAll(data);
            setDataSource('<span class="badge snapshot">static snapshot</span>' +
              'The Hermes worker is not reachable (' + esc(liveErr.message) + '), so every ' +
              'number on this page comes from the saved comparison document ' +
              '<code>' + esc(DATA_URL) + '</code>. Launch the worker with ' +
              '<code>bash hermes/app/launch.sh</code> and reload for live counts.');
          });
      })
      .catch(error => {
        document.getElementById('reports').innerHTML =
          `<div class="error">Could not load ${esc(DATA_URL)}: ${esc(error.message)}</div>`;
        setDataSource('');
      });
  </script>
</body>
</html>

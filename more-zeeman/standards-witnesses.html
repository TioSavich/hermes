<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes: Standards witnesses</title>
  <link rel="stylesheet" href="hermes-tokens.css">
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="render/hermes-shell.js" data-root="./" data-app="/" data-active="standards-witnesses"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--paper, #f4ead6); color: var(--ink, #0d0c08);
           font: 16px/1.5 var(--serif, Georgia, serif); }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 2.2rem 1.4rem 4rem; }
    h1 { margin: 0 0 .35rem; font-size: 1.7rem; }
    .lede { max-width: 76ch; margin: 0; color: var(--muted, #665f4f); }
    section { margin-top: 2rem; }
    section h2 { margin: 0 0 .75rem; font-size: 1.2rem; }
    .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: .8rem; }
    form { padding: 1rem; border: 1px solid var(--line, rgba(13,12,8,.14)); border-radius: 10px;
           background: var(--paper-cool, #ede4cf); }
    form h3 { margin: 0; font-size: 1rem; }
    .op { margin: .1rem 0 .5rem; color: var(--muted, #665f4f);
          font: .76rem/1.35 var(--mono, ui-monospace, Menlo, monospace); overflow-wrap: anywhere; }
    .description { margin: 0 0 .65rem; }
    label { display: block; margin-top: .5rem; font-size: .85rem; color: var(--muted, #665f4f); }
    input { width: 100%; margin-top: .2rem; padding: .5rem; border: 1px solid var(--line, #b8aa8b);
            border-radius: 5px; background: #fffdf7; color: inherit; font: inherit; }
    button { margin-top: .75rem; padding: .48rem .8rem; border: 1px solid var(--gold-deep, #8b641c);
             border-radius: 5px; background: var(--gold-deep, #8b641c); color: #fff; font: inherit; cursor: pointer; }
    output { display: block; min-height: 1.5rem; margin-top: .7rem; white-space: pre-wrap;
             overflow-wrap: anywhere; font: .8rem/1.4 var(--mono, ui-monospace, Menlo, monospace); }
    .error { color: #842d24; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Standards witnesses</h1>
    <p class="lede">These controls run finite traces carried by the loaded K–3 standards modules.
      Each result reports the trace and its boundary. The codes below are the codes recorded in
      those modules.</p>
    <p id="status" class="lede" role="status" aria-live="polite">Loading controls from the local worker…</p>
    <div id="bands"></div>
  </main>
  <script>
    (function () {
      "use strict";
      var groups = [
        {grade: "K", strand: "NS", ops: [
          "standard_k_ns_1_count_by_ones_witness", "standard_k_ns_2_represent_count_witness",
          "standard_k_ns_3_order_independence_witness", "standard_k_ns_4_verify_subitizing_witness",
          "standard_k_ns_5_6_compare_groups_witness", "standard_k_ns_7_place_value_witness"
        ]},
        {grade: "K", strand: "CA", ops: ["standard_k_ca_1_3_complement_witness"]},
        {grade: "1", strand: "NS", ops: [
          "standard_1_ns_1_count_by_fives_witness", "standard_1_ns_2_place_value_witness"
        ]},
        {grade: "1", strand: "CA", ops: [
          "standard_1_ca_1_making_ten_witness", "standard_1_ca_3_add_by_place_value_witness"
        ]},
        {grade: "2", strand: "NS", ops: [
          "standard_2_ns_1_count_by_twos_witness", "standard_2_ns_2_4_place_value_witness",
          "standard_2_ns_3_parity_witness", "standard_2_ns_5_place_value_comparison_witness"
        ]},
        {grade: "2", strand: "CA", ops: ["standard_2_ca_2_add_three_digit_witness"]},
        {grade: "3", strand: "NS", ops: [
          "standard_3_ns_2_unit_fraction_witness", "standard_3_ns_5_fraction_comparison_witness"
        ]},
        {grade: "3", strand: "CA", ops: [
          "standard_3_ca_3_4_fact_family_witness", "multiply_array_witness",
          "mult_div_family_witness", "standard_3_ca_5_mult_skip_count_witness"
        ]}
      ];
      var details = {
        standard_k_ns_1_count_by_ones_witness: {code: "K.NS.1", description: "A finite count-by-ones trace from the supplied from count to the supplied to count."},
        standard_k_ns_2_represent_count_witness: {code: "K.NS.2", description: "A finite object-count and numeral representation record."},
        standard_k_ns_3_order_independence_witness: {code: "K.NS.3", description: "A finite count of one object list and the same list in reverse order."},
        standard_k_ns_4_verify_subitizing_witness: {code: "K.NS.4", description: "A finite check that a recognized pattern and a counted list give the same quantity."},
        standard_k_ns_5_6_compare_groups_witness: {code: "K.NS.5–6", description: "A finite count-and-compare trace for two supplied object groups."},
        standard_k_ns_7_place_value_witness: {code: "K.NS.7", description: "A finite decomposition of a supplied number into one ten and ones."},
        standard_k_ca_1_3_complement_witness: {code: "K.CA.1–3", description: "A finite subtraction trace for the complement of the supplied count to ten."},
        standard_1_ns_1_count_by_fives_witness: {code: "1.NS.1", description: "A finite count-by-fives trace from the supplied from count to the supplied to count."},
        standard_1_ns_2_place_value_witness: {code: "1.NS.2", description: "A finite tens-and-ones decomposition of a two-digit number."},
        standard_1_ca_1_making_ten_witness: {code: "1.CA.1", description: "A finite addition trace that makes ten before adding the remainder."},
        standard_1_ca_3_add_by_place_value_witness: {code: "1.CA.3", description: "A finite addition trace that decomposes both addends by place value."},
        standard_2_ns_1_count_by_twos_witness: {code: "2.NS.1", description: "A finite count-by-twos trace from the supplied from count to the supplied to count."},
        standard_2_ns_2_4_place_value_witness: {code: "2.NS.2–4", description: "A finite hundreds, tens, and ones decomposition of a three-digit number."},
        standard_2_ns_3_parity_witness: {code: "2.NS.3", description: "A finite pairing trace that classifies a supplied number as even or odd."},
        standard_2_ns_5_place_value_comparison_witness: {code: "2.NS.5", description: "A finite place-by-place comparison of two three-digit numbers."},
        standard_2_ca_2_add_three_digit_witness: {code: "2.CA.2", description: "A finite three-digit addition trace with recorded regrouping decisions."},
        standard_3_ns_2_unit_fraction_witness: {code: "3.NS.2", description: "A finite unit-fraction record for one part of an allowed equal partition."},
        standard_3_ns_5_fraction_comparison_witness: {code: "3.NS.5", description: "A finite comparison of fractions with a shared numerator or denominator."},
        standard_3_ca_3_4_fact_family_witness: {code: "3.CA.3–4", description: "A finite multiplication and division fact-family trace."},
        multiply_array_witness: {code: "3.CA.3–4", description: "A finite rows-by-columns array multiplication trace."},
        mult_div_family_witness: {code: "3.CA.3–4", description: "A finite multiplication and inverse-division fact-family trace."},
        standard_3_ca_5_mult_skip_count_witness: {code: "3.CA.5", description: "A finite skip-count multiplication record for factor repeated times."}
      };
      var defaults = {
        standard_k_ns_1_count_by_ones_witness: {from: 1, to: 10},
        standard_k_ns_2_represent_count_witness: {object_count: 4},
        standard_k_ns_3_order_independence_witness: {objects: ["red", "blue", "green"]},
        standard_k_ns_4_verify_subitizing_witness: {pattern: "dice(4)"},
        standard_k_ns_5_6_compare_groups_witness: {group_a: ["a", "b", "c"], group_b: ["x", "y"]},
        standard_k_ns_7_place_value_witness: {number: 14},
        standard_k_ca_1_3_complement_witness: {given: 6},
        standard_1_ns_1_count_by_fives_witness: {from: 5, to: 20},
        standard_1_ns_2_place_value_witness: {number: 47},
        standard_1_ca_1_making_ten_witness: {a: 8, b: 5},
        standard_1_ca_3_add_by_place_value_witness: {a: 27, b: 35},
        standard_2_ns_1_count_by_twos_witness: {from: 2, to: 10},
        standard_2_ns_2_4_place_value_witness: {number: 347},
        standard_2_ns_3_parity_witness: {number: 8, result: "even"},
        standard_2_ns_5_place_value_comparison_witness: {left: 347, right: 329},
        standard_2_ca_2_add_three_digit_witness: {a: 347, b: 286},
        standard_3_ns_2_unit_fraction_witness: {denominator: 4},
        standard_3_ns_5_fraction_comparison_witness: {left: "1/4", result: "less_than", right: "3/4"},
        standard_3_ca_3_4_fact_family_witness: {a: 3, b: 4},
        multiply_array_witness: {cols: 4, rows: 3},
        mult_div_family_witness: {a: 3, b: 4},
        standard_3_ca_5_mult_skip_count_witness: {factor: 7, times: 8}
      };
      var numberInputs = {
        standard_k_ns_1_count_by_ones_witness: ["from", "to"],
        standard_k_ns_2_represent_count_witness: ["object_count"],
        standard_1_ns_1_count_by_fives_witness: ["from", "to"],
        standard_2_ns_1_count_by_twos_witness: ["from", "to"],
        standard_2_ns_2_4_place_value_witness: ["number"],
        standard_2_ns_5_place_value_comparison_witness: ["left", "right"],
        multiply_array_witness: ["cols", "rows"],
        mult_div_family_witness: ["a", "b"],
        standard_3_ca_5_mult_skip_count_witness: ["factor", "times"]
      };
      var recollectionInputs = {
        standard_k_ns_7_place_value_witness: ["number"],
        standard_k_ca_1_3_complement_witness: ["given"],
        standard_1_ns_2_place_value_witness: ["number"],
        standard_1_ca_1_making_ten_witness: ["a", "b"],
        standard_1_ca_3_add_by_place_value_witness: ["a", "b"],
        standard_2_ns_3_parity_witness: ["number"],
        standard_2_ca_2_add_three_digit_witness: ["a", "b"],
        standard_3_ns_2_unit_fraction_witness: ["denominator"],
        standard_3_ca_3_4_fact_family_witness: ["a", "b"]
      };
      var listInputs = {objects: true, group_a: true, group_b: true};
      var root = document.getElementById("bands");
      var status = document.getElementById("status");

      function isNumberInput(op, name) {
        return (numberInputs[op] || []).indexOf(name) !== -1;
      }

      function isRecollectionInput(op, name) {
        return (recollectionInputs[op] || []).indexOf(name) !== -1;
      }

      function isFractionInput(op, name) {
        return op === "standard_3_ns_5_fraction_comparison_witness"
          && (name === "left" || name === "right");
      }

      function recollectionTerm(value) {
        var count = Number(value);
        if (!Number.isInteger(count) || count < 0) throw new Error("counts must be nonnegative integers");
        var tallies = [];
        for (var index = 0; index < count; index += 1) tallies.push("tally");
        return "recollection([" + tallies.join(",") + "])";
      }

      function fractionTerm(value) {
        var match = /^\s*(\d+)\s*\/\s*(\d+)\s*$/.exec(value);
        if (!match) throw new Error("fractions must use n/d notation");
        return "fraction(" + recollectionTerm(match[1]) + "," + recollectionTerm(match[2]) + ")";
      }

      function field(op, name) {
        var label = document.createElement("label");
        label.textContent = listInputs[name] ? name + " (comma-separated list)"
          : isNumberInput(op, name) ? name + " (number)"
          : isRecollectionInput(op, name) ? name + " (count; converted to a grounded recollection)"
          : isFractionInput(op, name) ? name + " (fraction n/d; converted to grounded terms)"
          : name;
        var input = document.createElement("input");
        input.name = name;
        input.required = true;
        input.autocomplete = "off";
        if (isNumberInput(op, name) || isRecollectionInput(op, name)) {
          input.type = "number";
          input.min = "0";
          input.step = "1";
        }
        var value = defaults[op] && defaults[op][name];
        if (Array.isArray(value)) value = value.join(", ");
        if (value !== undefined) input.value = String(value);
        label.appendChild(input);
        return label;
      }

      function control(item) {
        var op = item.name;
        var detail = details[op];
        var form = document.createElement("form");
        var heading = document.createElement("h3");
        heading.textContent = detail.code;
        form.appendChild(heading);
        var opName = document.createElement("p");
        opName.className = "op";
        opName.textContent = op;
        form.appendChild(opName);
        var description = document.createElement("p");
        description.className = "description";
        description.textContent = detail.description;
        form.appendChild(description);
        item.inputs.forEach(function (name) { form.appendChild(field(op, name)); });
        var button = document.createElement("button");
        button.type = "submit";
        button.textContent = "Run trace";
        form.appendChild(button);
        var output = document.createElement("output");
        output.setAttribute("aria-live", "polite");
        form.appendChild(output);
        form.addEventListener("submit", function (event) {
          event.preventDefault();
          output.className = "";
          output.textContent = "Running trace…";
          var payload = {op: op};
          try {
            item.inputs.forEach(function (name) {
              var value = form.elements.namedItem(name).value;
              payload[name] = listInputs[name]
                ? value.split(",").map(function (part) { return part.trim(); }).filter(Boolean)
                : isNumberInput(op, name) ? Number(value)
                : isRecollectionInput(op, name) ? recollectionTerm(value)
                : isFractionInput(op, name) ? fractionTerm(value)
                : value;
            });
          } catch (error) {
            output.className = "error";
            output.textContent = "Trace not sent: " + error.message;
            return;
          }
          fetch("/api/witness/standards", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
          }).then(function (response) {
            return response.json().then(function (body) { return {ok: response.ok, body: body}; });
          }).then(function (reply) {
            if (reply.ok && reply.body.ok) {
              output.textContent = JSON.stringify(reply.body.result, null, 2);
              return;
            }
            output.className = "error";
            output.textContent = "Trace failed: " + String(reply.body.error || "The worker returned no detail.");
          }).catch(function (error) {
            output.className = "error";
            output.textContent = "Trace failed: " + error.message;
          });
        });
        return form;
      }

      var allowed = {};
      groups.forEach(function (group) {
        group.ops.forEach(function (op) { allowed[op] = true; });
      });
      fetch("/api/capabilities").then(function (response) {
        if (!response.ok) throw new Error("HTTP " + response.status);
        return response.json();
      }).then(function (data) {
        var entries = Array.isArray(data.capabilities) ? data.capabilities : [];
        var registry = {};
        entries.forEach(function (item) {
          if (allowed[item.name] && Array.isArray(item.inputs)) registry[item.name] = item;
        });
        var missing = Object.keys(allowed).filter(function (op) { return !registry[op]; });
        if (missing.length) {
          var registryError = new Error("the capability registry is missing: " + missing.join(", "));
          registryError.name = "RegistryError";
          throw registryError;
        }
        groups.forEach(function (group) {
          var section = document.createElement("section");
          var heading = document.createElement("h2");
          heading.textContent = "Grade " + group.grade + " · " + group.strand;
          section.appendChild(heading);
          var controls = document.createElement("div");
          controls.className = "controls";
          group.ops.forEach(function (op) { controls.appendChild(control(registry[op])); });
          section.appendChild(controls);
          root.appendChild(section);
        });
        status.textContent = "Controls built from the local capability registry.";
      }).catch(function (error) {
        status.className = "lede error";
        status.textContent = error.name === "RegistryError"
          ? "These controls cannot be built because " + error.message + "."
          : "The worker is unavailable, so these controls cannot be built. The request failed: " + error.message;
      });
    }());
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-hermes-base="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes: Capability Atlas</title>
  <link rel="stylesheet" href="hermes-tokens-dark.css">
  <script defer src="render/hermes-shell.js" data-root="./" data-app="/" data-active="atlas"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg, #110f08); color: var(--text, #d4cfc0);
           font: 16px/1.5 var(--serif, Georgia, serif); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 2.2rem 1.4rem 4rem; }
    h1 { font-size: 1.7rem; margin: 0 0 .3rem; }
    .lede { color: var(--muted, #8a8470); max-width: 66ch; margin: 0 0 1rem; }
    .counts { padding: .8rem 1rem; border: 1px solid var(--border, #3a3428);
              border-radius: 10px; background: var(--surface, #1a1710); }
    .status { margin: 1.2rem 0; color: var(--muted, #8a8470); }
    .error { color: var(--tension, #d4634a); border-left: 4px solid var(--tension, #d4634a); padding-left: .8rem; }
    section { margin-top: 2rem; }
    section h2 { margin: 0 0 .7rem; font-size: 1.2rem; }
    .capability { padding: .8rem 0; border-top: 1px solid var(--border, #3a3428); }
    .capability:first-of-type { border-top: 0; }
    .name { font: 600 .9rem/1.4 var(--mono, ui-monospace, Menlo, monospace); }
    .module, .inputs, .surface { margin-top: .2rem; font-size: .86rem; color: var(--muted, #8a8470); }
    .module code, .inputs code, .route { font-family: var(--mono, ui-monospace, Menlo, monospace); }
    .pages { margin: .25rem 0 0; padding-left: 1.2rem; font-size: .86rem; }
    a { color: var(--accent-ink, var(--accent, var(--snap, #e8a84c))); }
    .marker { font-weight: 600; color: var(--tension, #d4634a); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Capability Atlas</h1>
    <p class="lede">This registry is generated from the worker dispatch table, public routes,
      shipped pages, and bounded op-time load chains. Cordoned modules remain outside the startup
      closure even when a page describes them.</p>
    <div id="counts" class="counts">Loading the capability registry…</div>
    <div id="health" class="status">Loading worker health…</div>
    <div id="status" class="status" aria-live="polite"></div>
    <div id="groups"></div>
  </main>
  <script>
    (function () {
      "use strict";
      var countsNode = document.getElementById("counts");
      var statusNode = document.getElementById("status");
      var groupsNode = document.getElementById("groups");
      var healthNode = document.getElementById("health");

      function text(tag, value, className) {
        var node = document.createElement(tag);
        node.textContent = value;
        if (className) node.className = className;
        return node;
      }

      function pageHref(path) {
        var prefix = "/hermes/app/web/";
        return path.indexOf(prefix) === 0 ? "/" + path.slice(prefix.length) : path;
      }

      function renderSurface(item, box) {
        if (item.surface_status === "lazy_reachable") {
          var via = (item.lazy_via || []).join(", ") || "an attributed worker operation";
          box.appendChild(text("div", "Loaded on demand by " + via + ".", "surface"));
          renderDescriptionPages(item, box);
          return;
        }
        if (item.surface_status === "orphan_module" && (item.pages || []).length) {
          box.appendChild(text("div", "Described on:", "surface"));
          renderDescriptionPages(item, box);
          return;
        }
        if (item.surface_status === "routed_paged") {
          renderDescriptionPages(item, box);
          return;
        }
        if (item.surface_status === "routed_only") {
          var routes = (item.route || []).map(function (route) {
            return route.method + " " + route.path;
          }).join(", ");
          var routed = text("div", routes + ". No page reaches this route yet.", "surface");
          box.appendChild(routed);
          return;
        }
        box.appendChild(text("div", "Not yet surfaced", "surface marker"));
      }

      function renderDescriptionPages(item, box) {
        var list = document.createElement("ul");
        list.className = "pages";
        (item.pages || []).forEach(function (page) {
          var row = document.createElement("li");
          var link = document.createElement("a");
          link.href = pageHref(page);
          link.textContent = page;
          row.appendChild(link);
          list.appendChild(row);
        });
        box.appendChild(list);
      }

      function render(data) {
        var items = Array.isArray(data.capabilities) ? data.capabilities : [];
        var counts = data.counts || {};
        var health = data.health || {};
        var modules = health.loaded || health.loaded_modules || health.modules || [];
        healthNode.textContent = "Worker status: " + String(health.status || health.mode || "unknown")
          + "; " + (Array.isArray(modules) ? modules.length : Number(health.loaded_module_count || 0))
          + " loaded modules.";
        var orphans = counts.orphan_module || 0;
        var lazy = counts.lazy_reachable || 0;
        var ops = items.length - orphans - lazy;
        countsNode.textContent = ops + " capabilities: "
          + (counts.routed_paged || 0) + " reachable from a page, "
          + (counts.routed_only || 0) + " routed without a page, "
          + (counts.unrouted || 0) + " unrouted; "
          + lazy + " modules loaded on demand; "
          + orphans + " described or queued modules outside the load closure.";
        if (!items.length) {
          statusNode.textContent = "The worker returned no capability entries.";
          statusNode.className = "status error";
          return;
        }
        var grouped = {};
        items.forEach(function (item) {
          (grouped[item.role] = grouped[item.role] || []).push(item);
        });
        Object.keys(grouped).sort().forEach(function (role) {
          var section = document.createElement("section");
          section.appendChild(text("h2", role.replace(/_/g, " ")));
          grouped[role].sort(function (a, b) { return a.name.localeCompare(b.name); })
            .forEach(function (item) {
              var box = document.createElement("article");
              box.className = "capability";
              box.appendChild(text("div", item.name, "name"));
              var moduleLine = document.createElement("div");
              moduleLine.className = "module";
              moduleLine.appendChild(document.createTextNode("module "));
              moduleLine.appendChild(text("code", item.module));
              box.appendChild(moduleLine);
              var inputLine = document.createElement("div");
              inputLine.className = "inputs";
              inputLine.appendChild(document.createTextNode("inputs "));
              inputLine.appendChild(text("code", JSON.stringify(item.inputs || [])));
              box.appendChild(inputLine);
              renderSurface(item, box);
              section.appendChild(box);
            });
          groupsNode.appendChild(section);
        });
        statusNode.textContent = "Registry loaded from the local worker.";
      }

      fetch("/api/capabilities")
        .then(function (response) {
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response.json();
        })
        .then(render)
        .catch(function (error) {
          countsNode.textContent = "Capability counts are unavailable.";
          statusNode.textContent = "The capability registry requires a running Hermes worker. "
            + "The request failed: " + error.message;
          statusNode.className = "status error";
        });
    }());
  </script>
</body>
</html>

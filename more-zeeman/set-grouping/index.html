<body class="view-freshman" data-hshell-fit="1">
  <div class="wrap">
    <header class="host-head">
      <div>
        <h1>Set grouping</h1>
        <p class="subhead">Quantities as dots in ten-frames, bins, and make-ten pairings. Each frame is a step the grouping witness already names.</p>
      </div>
      <nav class="view-toggle" aria-label="audience">
        <button data-view="freshman" class="active">student</button>
        <button data-view="teacher">teacher</button>
        <button data-view="philosopher">researcher</button>
      </nav>
    </header>

    <div id="stage" class="stage"></div>

    <div class="rail">
    <div class="meta-line">
      <span id="context"></span>
      <span id="result"></span>
    </div>

    <div class="controls">
      <button id="prev">&larr; Prev</button>
      <input id="seek" type="range" min="0" max="0" value="0">
      <button id="next">Next &rarr;</button>
      <button id="play">Play</button>
      <span id="counter" class="counter"></span>
      <span id="annotation-flag" class="annot">annotation only</span>
      <button id="download">SVG</button>
    </div>

    <p id="caption" class="caption only-freshman"></p>

    <section class="panel only-philosopher">
      <h2>Formal signature</h2>
      <code id="tuple" class="tuple"></code>
      <div id="verbs" class="verbs"></div>
      <h3>Grounding (Lakoff &amp; N&uacute;&ntilde;ez)</h3>
      <div id="grounding" class="band"></div>
    </section>

    <section class="panel only-teacher">
      <h2>Teacher layer</h2>
      <div id="teacher" class="band"></div>
    </section>

    <section class="calc-bar">
      <input type="hidden" data-arg="spec" value="make_ten">
      <label>a <input data-arg="a" type="number" value="8"></label>
      <label>b <input data-arg="b" type="number" value="5"></label>
      <button id="calculate">Calculate</button>
      <span class="calc-note">POSTs to the worker; renders the returned witness frames.</span>
    </section>
    </div><!-- .rail -->
  </div>
